# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - KhulaCode

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build the React frontend and drop the production bundle into
      # KhulaCodeApp/backend/react_build so Django's TemplateView / static
      # config (see mysite/settings.py) can serve index.html + assets.
      - name: Install frontend dependencies
        working-directory: KhulaCodeApp/react_frontend/react_frontend_typescript
        run: npm ci

      - name: Build frontend
        working-directory: KhulaCodeApp/react_frontend/react_frontend_typescript
        run: npm run build

      - name: Copy frontend build into Django
        run: |
          rm -rf KhulaCodeApp/backend/react_build
          mkdir -p KhulaCodeApp/backend/react_build
          cp -r KhulaCodeApp/react_frontend/react_frontend_typescript/dist/. KhulaCodeApp/backend/react_build/

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Collect static files
        working-directory: KhulaCodeApp/backend
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: "False"
        run: |
          source ../../antenv/bin/activate
          python manage.py collectstatic --noinput

      # By default, when you enable GitHub CI/CD integration through the Azure portal, the platform automatically sets the SCM_DO_BUILD_DURING_DEPLOYMENT application setting to true. This triggers the use of Oryx, a build engine that handles application compilation and dependency installation (e.g., pip install) directly on the platform during deployment. Hence, we exclude the antenv virtual environment directory from the deployment artifact to reduce the payload size.
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/
            !KhulaCodeApp/react_frontend/react_frontend_typescript/node_modules/

      # 🚫 Opting Out of Oryx Build
      # If you prefer to disable the Oryx build process during deployment, follow these steps:
      # 1. Remove the SCM_DO_BUILD_DURING_DEPLOYMENT app setting from your Azure App Service Environment variables.
      # 2. Refer to sample workflows for alternative deployment strategies: https://github.com/Azure/actions-workflow-samples/tree/master/AppService


  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C6A86664EF30425DB3E39035EA3A2337 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D1FC8B02CA8E4516B2D02EA95F58A9E1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_857238D43EDD477E9D512BAC9E5E00F7 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'KhulaCode'
          slot-name: 'Production'
